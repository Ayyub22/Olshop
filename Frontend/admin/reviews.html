<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Ulasan - Admin TuKam</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>

<body class="admin-body">

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar__logo" style="justify-content: center; padding: 24px 20px;">
                <a href="/admin/dashboard.html" style="text-decoration: none;">
                    <span
                        style="color: #FF0000; font-size: 28px; font-family: 'Reem Kufi Fun', sans-serif; font-weight: 700;">TuKam</span>
                </a>
            </div>
            <nav class="admin-nav">
                <a href="/admin/dashboard.html" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                    </svg>
                    Dashboard
                </a>
                <a href="/admin/orders.html" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    Pesanan
                </a>
                <a href="/admin/products.html" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </svg>
                    Produk
                </a>
                <a href="/admin/add-product.html" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="16" />
                        <line x1="8" y1="12" x2="16" y2="12" />
                    </svg>
                    Tambah Produk
                </a>
                <a href="/admin/reviews.html" class="admin-nav__item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    Kelola Ulasan
                </a>
                <div class="admin-nav__divider"></div>

                <a href="/" target="_blank" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                        <polyline points="15 3 21 3 21 9" />
                        <line x1="10" y1="14" x2="21" y2="3" />
                    </svg>
                    Lihat Website
                </a>
                <button class="admin-nav__item admin-nav__logout" id="logoutBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    Logout
                </button>
            </nav>
        </aside>

        <!-- Main -->
        <main class="admin-main">
            <div class="admin-topbar">
                <div>
                    <h1 class="admin-page-title">Kelola Ulasan</h1>
                    <p class="admin-page-subtitle" id="reviewCountLabel">Memuat...</p>
                </div>
            </div>

            <!-- Reviews Table -->
            <div class="admin-card">
                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Produk</th>
                                <th>Reviewer</th>
                                <th>Rating</th>
                                <th style="width: 35%;">Isi Ulasan</th>
                                <th>Tanggal</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="reviewsTableBody"></tbody>
                    </table>
                </div>
                <div id="emptyState" style="display:none; padding:40px; text-align:center; color:var(--text-muted);">
                    <div style="font-size:2rem; margin-bottom:8px;">&#8987;</div>
                    <div style="font-weight:700;">Tidak ada ulasan ditemukan</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
        <div
            style="background:white; border-radius:var(--radius-lg); padding:32px; max-width:400px; width:90%; text-align:center;">
            <div style="font-size:2rem; margin-bottom:12px;" id="modalIcon">&#9888;</div>
            <div style="font-size:1.1rem; font-weight:700; margin-bottom:8px;" id="modalTitle">Konfirmasi</div>
            <div style="font-size:0.875rem; color:var(--text-muted); margin-bottom:24px;" id="modalDesc">Apakah Anda
                yakin?</div>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn btn-outline-primary" onclick="closeModal()">Batal</button>
                <button class="btn btn-primary" id="modalConfirmBtn">Konfirmasi</button>
            </div>
        </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/data.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script>
        if (!AdminAuth.requireAuth()) throw new Error('Not authenticated');

        let allReviews = [];
        let modalCallback = null;

        function renderStars(rating) {
            let starsHtml = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    starsHtml += '<svg style="color:#FBBF24; width:14px; height:14px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>';
                } else {
                    starsHtml += '<svg style="color:#d1d5db; width:14px; height:14px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>';
                }
            }
            return `<div style="display:flex; align-items:center; gap:2px;">${starsHtml}</div>`;
        }

        async function loadReviews() {
            allReviews = Utils.getAllReviewsFromStorage();
            // Sort by date descending
            allReviews.sort((a, b) => new Date(b.date) - new Date(a.date));

            document.getElementById('reviewCountLabel').textContent = allReviews.length + ' ulasan ditemukan';

            const tbody = document.getElementById('reviewsTableBody');
            const empty = document.getElementById('emptyState');

            if (allReviews.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px;">Loading data produk...</td></tr>';

            try {
                const apiRes = await API.getAdminProducts({ per_page: 500 });
                const products = apiRes?.data || [];
                const productMap = {};
                products.forEach(p => {
                    productMap[p.id] = p;
                });

                tbody.innerHTML = allReviews.map(r => {
                    const apiProd = productMap[r.productId];
                    const title = apiProd ? apiProd.name : 'Produk Dihapus';
                    const image = apiProd && apiProd.image_url ? apiProd.image_url : '/assets/img/placeholder.png';

                    return `
      <tr>
        <td>
          <div style="display:flex; align-items:center; gap:10px;">
            <img src="${image}" style="width:40px; height:40px; border-radius:6px; object-fit:cover; flex-shrink:0;">
            <div>
              <div style="font-weight:600; font-size:0.875rem; margin-bottom:2px; max-width: 180px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${title}">${title}</div>
            </div>
          </div>
        </td>
        <td><div style="font-weight:600;">${r.name}</div></td>
        <td>${renderStars(r.rating)}</td>
        <td style="color:var(--text-secondary); font-size: 0.825rem;"><div style="display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;" title="${r.text}">${r.text}</div></td>
        <td style="font-size:0.8rem; color:var(--text-muted); white-space:nowrap;">${Utils.formatDate(r.date)}</td>
        <td>
          <div style="display:flex; gap:4px;">
            <button class="admin-action-btn" title="Hapus Ulasan" onclick="deleteReviewPrompt('${r.productId}', ${r.reviewIndex}, '${r.name}')">Hapus</button>
          </div>
        </td>
      </tr>
    `}).join('');
            } catch (e) {
                console.error("Gagal meload produk ulasan", e);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px; color:red;">Gagal memuat detail produk.</td></tr>';
            }
        }

        function deleteReviewPrompt(productId, reviewIndex, reviewerName) {
            showModal('&#128465;', 'Hapus Ulasan', `Hapus ulasan dari "${reviewerName}"? Tindakan ini tidak dapat dibatalkan.`, () => {
                const deleted = Utils.deleteReview(productId, reviewIndex);
                if (deleted) {
                    loadReviews();
                    Utils.showToast('Ulasan berhasil dihapus', 'error');
                } else {
                    Utils.showToast('Gagal menghapus ulasan', 'error');
                }
            });
        }

        function showModal(icon, title, desc, callback) {
            document.getElementById('modalIcon').textContent = icon;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalDesc').textContent = desc;
            modalCallback = callback;
            document.getElementById('confirmModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('confirmModal').style.display = 'none';
            modalCallback = null;
        }

        document.getElementById('modalConfirmBtn').addEventListener('click', () => {
            if (modalCallback) modalCallback();
            closeModal();
        });

        document.getElementById('confirmModal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            AdminAuth.logout();
            window.location.href = '/admin/index.html';
        });

        loadReviews();
    </script>
</body>

</html>
