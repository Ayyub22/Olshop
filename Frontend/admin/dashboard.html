<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - TuKam</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>

<body class="admin-body">

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar__logo" style="justify-content: center; padding: 24px 20px;">
                <a href="/admin/dashboard.html" style="text-decoration: none;">
                    <span
                        style="color: #FF0000; font-size: 28px; font-family: 'Reem Kufi Fun', sans-serif; font-weight: 700;">TuKam</span>
                </a>
            </div>
            <nav class="admin-nav">
                <a href="/admin/dashboard.html" class="admin-nav__item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                    </svg>
                    Dashboard
                </a>
                <a href="/admin/orders.html" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    Pesanan
                </a>
                <a href="/admin/products.html" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </svg>
                    Produk
                </a>
                <a href="/admin/add-product.html" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="16" />
                        <line x1="8" y1="12" x2="16" y2="12" />
                    </svg>
                    Tambah Produk
                </a>
                <a href="/admin/reviews.html" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    Kelola Ulasan
                </a>
                <div class="admin-nav__divider"></div>
                
                <a href="/" target="_blank" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                        <polyline points="15 3 21 3 21 9" />
                        <line x1="10" y1="14" x2="21" y2="3" />
                    </svg>
                    Lihat Website
                </a>
                <button class="admin-nav__item admin-nav__logout" id="logoutBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    Logout
                </button>
            </nav>
        </aside>

        <!-- Main -->
        <main class="admin-main">
            <div class="admin-topbar">
                <div>
                    <h1 class="admin-page-title">Dashboard</h1>
                    <p class="admin-page-subtitle">Selamat datang di Admin Panel TuKam</p>
                </div>
                <a href="/admin/add-product.html" class="btn btn-primary">+ Tambah Produk</a>
            </div>

            <!-- Stats Cards -->
            <div class="admin-stats-grid" id="statsGrid"></div>

            <!-- Recent Products -->
            <div class="admin-card" style="margin-top:24px;">
                <div class="admin-card__header">
                    <div class="admin-card__title">Produk Terbaru</div>
                    <a href="/admin/products.html" class="section-link">Lihat Semua ?</a>
                </div>
                <div class="admin-table-wrap">
                    <table class="admin-table" id="recentTable">
                        <thead>
                            <tr>
                                <th>Produk</th>
                                <th>Brand</th>
                                <th>Harga</th>
                                <th>Cabang</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="recentTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Quick Stats by Branch -->
            <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:16px; margin-top:24px;"
                id="branchStats"></div>
        </main>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script>
        if (!AdminAuth.requireAuth()) throw new Error('Not authenticated');

        async function loadDashboard() {
            try {
                const data = await API.getAdminProducts({ per_page: 500 });
                if (!data) return;

                const products = data.data || [];
                const total = data.total || products.length;
                const available = products.filter(p => p.status === 'available').length;
                const sold = products.filter(p => p.status === 'sold').length;
                const archived = products.filter(p => p.status === 'archived').length;

                document.getElementById('statsGrid').innerHTML = [
                    { label: 'Total Produk', value: total, icon: '\u{1F4E6}', color: '#6366F1' },
                    { label: 'Tersedia', value: available, icon: '\u2705', color: '#10B981' },
                    { label: 'Terjual', value: sold, icon: '\u{1F3F7}', color: '#F59E0B' },
                    { label: 'Diarsipkan', value: archived, icon: '\u{1F4C1}', color: '#6B7280' },
                ].map(s => `
                    <div class="admin-stat-card" style="border-left: 4px solid ${s.color}">
                        <div class="admin-stat-card__icon">${s.icon}</div>
                        <div class="admin-stat-card__value">${s.value}</div>
                        <div class="admin-stat-card__label">${s.label}</div>
                    </div>
                `).join('');

                // Recent products (latest 8)
                const recent = products.slice(0, 8);
                document.getElementById('recentTableBody').innerHTML = recent.length === 0
                    ? '<tr><td colspan="6" style="text-align:center; padding:32px; color:var(--text-muted);">Belum ada produk</td></tr>'
                    : recent.map(p => `
                    <tr>
                        <td>
                            <div style="display:flex; align-items:center; gap:10px;">
                                ${p.image_url ? `<img src="${p.image_url}" style="width:40px; height:40px; border-radius:6px; object-fit:cover;">` : '<div style="width:40px; height:40px; border-radius:6px; background:#f0f0f0;"></div>'}
                                <span style="font-weight:600; font-size:0.875rem;">${p.name}</span>
                            </div>
                        </td>
                        <td>${p.brand ? p.brand.name : '-'}</td>
                        <td style="font-weight:700; color:var(--primary);">${Utils.formatPrice(p.price)}</td>
                        <td>${p.branch ? p.branch.name : '-'}</td>
                        <td>${Utils.getStatusBadge(p.status)}</td>
                        <td>
                            <div style="display:flex; gap:6px;">
                                 <a href="/kamera/product.html?slug=${p.slug}" target="_blank" class="admin-action-btn" title="Lihat">Lihat</a>
                                <a href="/admin/add-product.html?edit=${p.id}" class="admin-action-btn" title="Edit">Edit</a>
                            </div>
                        </td>
                    </tr>
                `).join('');

                // Branch stats — always show ALL branches from API (even if 0 products)
                let allBranchesData = [];
                try { allBranchesData = await API.getBranches(); } catch (e) { }

                const branches = {};
                // Initialize all known branches with 0
                allBranchesData.forEach(b => {
                    branches[b.name] = { available: 0, sold: 0 };
                });
                // Overlay actual product counts
                products.forEach(p => {
                    const name = p.branch ? p.branch.name : 'Lainnya';
                    if (!branches[name]) branches[name] = { available: 0, sold: 0 };
                    if (p.status === 'available') branches[name].available++;
                    if (p.status === 'sold') branches[name].sold++;
                });

                document.getElementById('branchStats').innerHTML = Object.entries(branches).map(([name, stats]) => `
                    <div class="admin-card" style="padding:20px;">
                        <div style="font-weight:700; margin-bottom:12px;">&#128205; ${name}</div>
                        <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:6px;">
                            <span style="color:var(--text-muted)">Tersedia</span>
                            <span style="font-weight:700; color:#10B981">${stats.available}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:0.85rem;">
                            <span style="color:var(--text-muted)">Terjual</span>
                            <span style="font-weight:700; color:#F59E0B">${stats.sold}</span>
                        </div>
                        <a href="/admin/products.html?branch=${encodeURIComponent(name)}" class="btn btn-outline-primary btn-sm btn-full" style="margin-top:12px;">Kelola</a>
                    </div>
                `).join('');

            } catch (e) {
                document.getElementById('statsGrid').innerHTML = '<p style="color:red">Gagal memuat data. Pastikan backend berjalan.</p>';
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            AdminAuth.logout();
            window.location.href = '/admin/index.html';
        });

        loadDashboard();
    </script>
</body>

</html>
