<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pesanan - Admin TuKam</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
    <style>
        .order-table th,
        .order-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #EEE;
            text-align: left;
        }

        .order-table th {
            background: #fafafa;
            font-weight: 600;
            font-family: 'Instrument Sans', sans-serif;
        }

        .order-table td {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background: #FEF3C7;
            color: #92400E;
        }

        .status-paid {
            background: #DBEAFE;
            color: #1E40AF;
        }

        .status-shipped {
            background: #E0E7FF;
            color: #3730A3;
        }

        .status-completed {
            background: #D1FAE5;
            color: #065F46;
        }

        .status-cancelled {
            background: #FEE2E2;
            color: #991B1B;
        }

        .action-select {
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
        }

        .action-button {
            background: #FF0000;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .filters-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            align-items: center;
        }

        .filters-bar input,
        .filters-bar select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="admin-body">

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="sidebar"></aside>

        <!-- Main -->
        <main class="admin-main">
            <div class="admin-topbar">
                <div>
                    <h1 class="admin-page-title">Kelola Pesanan</h1>
                    <p class="admin-page-subtitle">Daftar pesanan dari pelanggan</p>
                </div>
            </div>

            <div class="admin-card">
                <div class="filters-bar">
                    <input type="text" id="searchFilter" placeholder="Cari No Pesanan / Nama..." style="flex: 1;">
                    <select id="statusFilter">
                        <option value="">Semua Status</option>
                        <option value="pending">Pending</option>
                        <option value="paid">Dibayar</option>
                        <option value="shipped">Dikirim</option>
                        <option value="completed">Selesai</option>
                        <option value="cancelled">Dibatalkan</option>
                    </select>
                    <button class="btn btn-primary" onclick="loadOrders(1)">Terapkan</button>
                </div>

                <div class="admin-table-wrap">
                    <table class="admin-table order-table" id="ordersTable"
                        style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr>
                                <th>No. Pesanan</th>
                                <th>Pelanggan</th>
                                <th>Metode Bayar</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Ubah Status</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody">
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 20px;">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination-container" id="pagination" style="margin-top: 24px;"></div>
            </div>
        </main>
    </div>

    <!-- Injecting Sidebar HTML dynamically to save space in this file -->
    <script>
        document.getElementById('sidebar').innerHTML = `
            <div class="admin-sidebar__logo" style="justify-content: center; padding: 24px 20px;">
                <a href="/admin/dashboard.html" style="text-decoration: none;">
                    <span style="color: #FF0000; font-size: 28px; font-family: 'Reem Kufi Fun', sans-serif; font-weight: 700;">TuKam</span>
                </a>
            </div>
            <nav class="admin-nav">
                <a href="/admin/dashboard.html" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /></svg>
                    Dashboard
                </a>
                <a href="/admin/orders.html" class="admin-nav__item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Pesanan
                </a>
                <a href="/admin/products.html" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" /><circle cx="12" cy="13" r="4" /></svg>
                    Produk
                </a>
                <a href="/admin/add-product.html" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="16" /><line x1="8" y1="12" x2="16" y2="12" /></svg>
                    Tambah Produk
                </a>
                <a href="/admin/reviews.html" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    Kelola Ulasan
                </a>
                <div class="admin-nav__divider"></div>
                
                <a href="/" target="_blank" class="admin-nav__item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></svg>
                    Lihat Website
                </a>
                <button class="admin-nav__item admin-nav__logout" id="logoutBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></svg>
                    Logout
                </button>
            </nav>
        `;
    </script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script>
        if (!AdminAuth.requireAuth()) throw new Error('Not authenticated');

        document.getElementById('logoutBtn').addEventListener('click', () => {
            AdminAuth.logout();
            window.location.href = '/admin/index.html';
        });

        let currentPage = 1;

        async function loadOrders(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchFilter').value;
            const status = document.getElementById('statusFilter').value;

            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px;">Memuat data...</td></tr>';

            try {
                const res = await API.getAdminOrders({ search, status, page });
                if (!res || !res.data) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px;">Gagal memuat daftar pesanan.</td></tr>';
                    return;
                }

                if (res.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px;">Tidak ada pesanan ditemukan.</td></tr>';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                let html = '';
                res.data.forEach(order => {
                    const statusVal = order.status;
                    let badgeClass = 'status-pending';
                    let statusText = 'Pending';
                    if (statusVal === 'paid') { badgeClass = 'status-paid'; statusText = 'Dibayar'; }
                    else if (statusVal === 'shipped') { badgeClass = 'status-shipped'; statusText = 'Dikirim'; }
                    else if (statusVal === 'completed') { badgeClass = 'status-completed'; statusText = 'Selesai'; }
                    else if (statusVal === 'cancelled') { badgeClass = 'status-cancelled'; statusText = 'Dibatalkan'; }

                    const method = order.payment_method.toUpperCase();

                    html += `
                        <tr>
                            <td><strong>${order.order_number}</strong><br><small style="color:#666">${new Date(order.created_at).toLocaleDateString()}</small></td>
                            <td>
                                <strong>${order.name}</strong><br>
                                <span style="font-size:12px;color:#666">${order.phone}</span><br>
                                <div style="font-size:12px;color:#666;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${order.address}">${order.address}</div>
                            </td>
                            <td>${method}</td>
                            <td style="font-weight:600; color:#FF0000">${Utils.formatPrice(order.total_amount)}</td>
                            <td><span class="status-badge ${badgeClass}">${statusText}</span></td>
                            <td>
                                <div style="display:flex;gap:8px;flex-direction:column;">
                                    <div style="display:flex;gap:8px;align-items:center;">
                                        <select class="action-select" id="statusSelect_${order.id}" style="width: 100px;">
                                            <option value="pending" ${statusVal === 'pending' ? 'selected' : ''}>Pending</option>
                                            <option value="paid" ${statusVal === 'paid' ? 'selected' : ''}>Dibayar</option>
                                            <option value="shipped" ${statusVal === 'shipped' ? 'selected' : ''}>Dikirim</option>
                                            <option value="completed" ${statusVal === 'completed' ? 'selected' : ''}>Selesai</option>
                                            <option value="cancelled" ${statusVal === 'cancelled' ? 'selected' : ''}>Batal</option>
                                        </select>
                                        <button class="action-button" onclick="updateStatus(${order.id})">Simpan</button>
                                    </div>
                                    <div style="display:flex;gap:4px;flex-direction:column;margin-top:4px;">
                                        <div style="font-size:12px; font-weight:600; color:#444; background:#f0f0f0; padding:6px; border-radius:4px; text-transform:uppercase;">
                                            Kurir: ${order.courier || '-'}
                                        </div>
                                        <input type="text" id="resiInput_${order.id}" class="action-select" placeholder="Nomor Resi" value="${order.tracking_number || ''}" style="font-size:11px;padding:4px;width:100%;">
                                    </div>
                                </div>
                            </td>
                        </tr>
                    `;
                });

                tbody.innerHTML = html;
                renderPagination(res.current_page, res.last_page);
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px;">Terjadi kesalahan sistem.</td></tr>';
            }
        }

        async function updateStatus(id) {
            const select = document.getElementById('statusSelect_' + id);
            const resiInput = document.getElementById('resiInput_' + id);

            const newStatus = select.value;
            // Courier is no longer updated by admin, it's chosen by the user during checkout
            const newCourier = null;
            const newTracking = resiInput ? resiInput.value.trim() : null;

            if (newStatus === 'shipped' && !newTracking) {
                alert('Nomor Resi wajib diisi jika status Dikirim!');
                return;
            }

            try {
                select.disabled = true;
                if (resiInput) resiInput.disabled = true;

                await API.updateAdminOrderStatus(id, newStatus, newTracking);

                alert('Status pesanan berhasil diperbarui!');
                loadOrders(currentPage);
            } catch (err) {
                alert('Gagal memperbarui status: ' + (err.message || 'Error'));
                select.disabled = false;
                if (resiInput) resiInput.disabled = false;
            }
        }

        function renderPagination(current, last) {
            const cont = document.getElementById('pagination');
            if (last <= 1) { cont.innerHTML = ''; return; }
            let html = '';

            if (current > 1) {
                html += '<button onclick="loadOrders(' + (current - 1) + ')" class="btn btn-outline-primary btn-sm">Prev</button>';
            }

            for (let i = 1; i <= last; i++) {
                if (i === current) {
                    html += '<button class="btn btn-primary btn-sm">' + i + '</button>';
                } else {
                    html += '<button onclick="loadOrders(' + i + ')" class="btn btn-outline-primary btn-sm">' + i + '</button>';
                }
            }

            if (current < last) {
                html += '<button onclick="loadOrders(' + (current + 1) + ')" class="btn btn-outline-primary btn-sm">Next</button>';
            }
            cont.innerHTML = html;
        }

        // Search trigger on ENTER key
        document.getElementById('searchFilter').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') loadOrders(1);
        });

        // Load initially
        loadOrders(1);
    </script>
</body>

</html>
