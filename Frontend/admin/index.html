<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TuKam</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi+Fun:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .login-logo-icon {
            width: 44px;
            height: 44px;
            background: var(--primary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-logo-text {
            font-size: 1.3rem;
            font-weight: 800;
        }

        .login-logo-text span {
            color: var(--primary);
        }

        .login-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .login-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
            font-family: var(--font);
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(232, 93, 4, 0.1);
        }

        .login-error {
            background: #FEE2E2;
            border: 1px solid #FECACA;
            color: #991B1B;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }

        .login-hint {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 16px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-logo" style="justify-content: center; margin-bottom: 32px;">
            <span
                style="color: #FF0000; font-size: 36px; font-family: 'Reem Kufi Fun', sans-serif; font-weight: 700;">TuKam</span>
        </div>

        <div class="login-title">Admin Panel</div>
        <div class="login-subtitle">Masuk untuk mengelola produk</div>

        <div class="login-error" id="loginError">Email atau password salah.</div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-input" placeholder="Masukkan email"
                    autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Masukkan password"
                    autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">
                Masuk ke Admin Panel
            </button>
        </form>

        <div class="login-hint">
            Email: <strong>admin@gmail.com</strong> / <strong>password123</strong>
        </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script>
        // Redirect if already logged in
        if (AdminAuth.isLoggedIn()) {
            window.location.href = '/admin/dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = this.querySelector('button[type="submit"]');
            const errEl = document.getElementById('loginError');

            btn.textContent = 'Memproses...';
            btn.disabled = true;
            errEl.style.display = 'none';

            const success = await AdminAuth.login(email, password);
            if (success) {
                window.location.href = '/admin/dashboard.html';
            } else {
                errEl.style.display = 'block';
                btn.textContent = 'Masuk ke Admin Panel';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
